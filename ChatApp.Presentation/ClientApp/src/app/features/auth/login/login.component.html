<div class="auth-card">

  <!-- ── Left visual panel ── -->
  <div class="auth-visual">
    <div class="visual-content">
      <div class="visual-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <h2 class="visual-title">Lumina Chat</h2>
      <p class="visual-sub">Connect and collaborate<br>in real-time.</p>
    </div>
  </div>

  <!-- ── Right form panel ── -->
  <div class="auth-form">

    <!-- Mobile logo (hidden on desktop) -->
    <div class="mobile-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </div>

    <h3 class="form-heading">Welcome back</h3>
    <p class="form-subheading">Enter your details to sign in.</p>

    <!-- Error message -->
    <div class="error-alert" *ngIf="errorMessage">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit()">

      <div class="field-group">
        <label class="field-label" for="login-username">Username</label>
        <input
          id="login-username"
          type="text"
          class="auth-input"
          placeholder="Enter your username"
          [(ngModel)]="username"
          name="username"
          required
          autocomplete="username" />
      </div>

      <div class="field-group">
        <label class="field-label" for="login-password">Password</label>
        <input
          id="login-password"
          type="password"
          class="auth-input"
          placeholder="Enter your password"
          [(ngModel)]="password"
          name="password"
          required
          autocomplete="current-password" />
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading || !username || !password">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm"></span>
        <span>{{ isLoading ? 'Signing in…' : 'Sign In' }}</span>
      </button>

    </form>

    <div class="auth-switch">
      Don't have an account?
      <a routerLink="/register">Sign up</a>
    </div>

  </div>
</div>
